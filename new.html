<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大病毒</title>
    <style>

    body {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    /* 炸彈本體 */
    .soot-bomb {
        position: relative;
        width: 80px;
        height: 80px;
        background: #000;
        border-radius: 50%;
        /* 營造毛茸茸的質感 */
        box-shadow: 
            0 0 0 4px #000,
            0 0 15px 5px rgba(0,0,0,0.6);
    }

    /* 煤球眼睛 */
    .soot-bomb::before,
    .soot-bomb::after {
        content: '';
        position: absolute;
        top: 35%;
        width: 15px;
        height: 15px;
        background: white;
        border-radius: 50%;
        z-index: 2;
    }
    
    /* 左眼與右眼位置 */
    .soot-bomb::before { left: 20%; }
    .soot-bomb::after { right: 20%; }

    /* 眼珠 */
    .pupil {
        position: absolute;
        width: 7px;
        height: 7px;
        background: #000;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    /* 炸彈引信 */
    .fuse {
        position: absolute;
        top: -20px;
        right: 10px;
        width: 4px;
        height: 30px;
        background: #8b4513; /* 咖啡色引信 */
        transform: rotate(20deg);
        border-radius: 2px;
    }

    /* 燃燒的火花 */
    .spark {
        position: absolute;
        top: -30px;
        right: 18px;
        width: 10px;
        height: 10px;
        background: #ff4500;
        border-radius: 50%;
        box-shadow: 0 0 10px #ffcc00, 0 0 20px #ff4500;
        /* 讓火花有一點微小的閃爍感 */
        animation: spark-flash 0.2s infinite alternate;
    }

    @keyframes spark-flash {
        from { transform: scale(1); opacity: 1; }
        to { transform: scale(1.3); opacity: 0.8; }
    }
</style>


</head>

<body>
<div class="soot-bomb">
    <div class="fuse"></div>
    <div class="spark"></div>
    <div style="position: absolute; width: 100%; height: 100%;">
        <div class="pupil" style="left: 30%; top: 45%;"></div>
        <div class="pupil" style="left: 70%; top: 45%;"></div>
    </div>
</div>
</body>

</html>
